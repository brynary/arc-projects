<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fabro Racer</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="hud-layer">
      <div id="hud-position">6th</div>
      <div id="hud-lap">Lap 1/3</div>
      <div id="hud-timer">0:00.000</div>
      <div id="hud-speed-bar"><div id="hud-speed-fill"></div></div>
      <div id="hud-item"></div>
      <div id="hud-drift-tier"></div>
      <div id="hud-boost-indicator"></div>
    </div>
    <div id="menu-layer"></div>
    <canvas id="minimap-canvas" width="180" height="180"></canvas>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
